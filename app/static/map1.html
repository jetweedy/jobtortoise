<style>

<div id="info">

<script type="text/javascript">


hr_systems = {
  "":{},
  "PeopleAdmin":{},
  "Workday":{},
  "PageUp":{},
  "NEOGOV / NeoEd":{},
  "Interfolio":{},
  "Oracle Taleo":{},
  "iCIMS":{},
  "SmartRecruiters":{},
  "UKG / UltiPro":{},
  "Jobvite":{},
  "Cornerstone":{},
  "SuccessFactors":{},
  "Unknown":{},
}


//// Including the Leaflet script tags gives you access to the Leaflet 'L' variable, which contains all of the functionality for the library.
//// We can make a map with it by handing the ID of the element that will contain it ('map'):
var map = L.map('map');
//// Then we can set the lat/lng and the initial zoom:
map.setView([40, -100], 4);
//// And we can specify a tile layer, as well as a maximum possible zoom:
L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 18
}).addTo(map);
//// (After creating that tile layer, we also add it to our map.)

map.on('click', function(e) {
    var lat = e.latlng.lat;
    var lng = e.latlng.lng;
    console.log(lat, lng);
});



map.createPane("schoolsPane");
map.getPane("schoolsPane").style.zIndex = 400;


function getEduDomain(webaddr) {
  try {
    // Ensure URL has a protocol so URL() can parse it
    if (!/^https?:\/\//i.test(webaddr)) {
      webaddr = "https://" + webaddr;
    }
    const host = new URL(webaddr).hostname;
    const match = host.match(/([^.]+\.edu)$/i);
    return match ? match[1] : null;
  } catch (e) {
    return null;
  }
}

function googlify(x) {
  return "https://www.google.com/search?q=" + encodeURIComponent(x);
}

var schoolData = {};
function processSchoolData(schools) {
  for (var school of schools) {
    schoolData[school.unitid] = school;
    //schoolData[school.unitid].hr_system = "";
  }
  //console.log(schoolData);
  return schoolData;
}

circleMarkerColors = {
  "empty":"pink",
  "changed":"lightgreen",
  "complete":"gray",
}

function loadSchools() {
  $.get("/jobs/ipeds_schools", function(schools) {
    schoolData = processSchoolData(schools);
    for (var x of schools) {
      if (x.iclevel >2) { continue; }
      var mColor = circleMarkerColors["complete"];
      console.log(x.hr_system);
      if (x.hr_system==null) {
        mColor = circleMarkerColors["empty"];
      }
      var oColor = "black";
      var mRadius = (x.instsize)*2+2;
      var marker = L.circleMarker( [ x.latitude, x.longitud ] , {
        pane: "schoolsPane",
        radius: mRadius,
        color: oColor,      // outline color
        weight: 1,
        fillColor: mColor,  // fill color
        fillOpacity: 1
      });
      marker.addTo(map);
      var puc = x.instnm+"<hr>"+x.addr+"<br />"+x.city+"<br />"+x.stabbr+"<br />"+x.zip;
      marker.bindTooltip(puc); //.openTooltip();
      //var popupContent = document.createElement("div");
      //popupContent.innerHTML = puc;
      //marker.bindPopup(popupContent);
      marker.on("click", function(x) {
        var gtext = "Jobs at " + getEduDomain(x.webaddr);
        var glink = googlify(gtext);
        $("#info").html("");
        $("#info").append($("<div>").html("<strong>"+x.instnm+"</strong><hr /><a href='"+x.webaddr+"' target='_blank'>"+x.webaddr+"</a><hr /><a href='"+glink+"' target='_blank'>"+gtext+"</a><hr />"));
        var s = $("<select>");
        for (var hrSys in hr_systems) {
          var o = $("<option>", {
            "text":hrSys,
            "value":hrSys
          });
          s.append(o);
        }
        s.val(schoolData[x.unitid].hr_system);
        s.on("change", function(el, id) {
          console.log(el.val(), id);
          $.post("/jobs/update_hr_system", {
            "unitid":id, "hr_system":el.val()
          }, function(x) {
            console.log(x);
          });
          schoolData[id].hr_system = el.val();
          this.setStyle({
            fillColor: circleMarkerColors["changed"]
          });
        }.bind(marker, s, x.unitid));
        $("#info").append(s);
      }.bind(marker, x));

    }
  })
  .fail(function(xhr, status, error) {
    console.log("FAIL");
    console.log("status:", status);
    console.log("error:", error);
    console.log("http status:", xhr.status);
    console.log("response text:", xhr.responseText);
  })
  ;
}





loadSchools();



</script>
