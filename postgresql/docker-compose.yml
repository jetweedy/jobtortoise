services:
  db:
    image: postgres:16
    container_name: pg-dev
    environment:
      POSTGRES_DB: qr_app
      POSTGRES_USER: qr_admin
      POSTGRES_PASSWORD: qr_password
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U qr_admin -d qr_app"]
      interval: 5s
      timeout: 5s
      retries: 10

  adminer:
    image: adminer:latest
    container_name: pg-adminer
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
